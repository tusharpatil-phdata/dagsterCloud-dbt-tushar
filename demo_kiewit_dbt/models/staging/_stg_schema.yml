version: 2


models:
  - name: stg_customers
    description: 'Silver view - cleaned customer data'
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique
      - name: full_name
        tests:
          - not_null
      - name: first_name
        tests:
          - not_null
      - name: last_name
        tests:
          - not_null
      - name: name_initials
        tests:
          - not_null
