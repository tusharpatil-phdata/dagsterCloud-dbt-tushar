version: 2

models:
  - name: stg_customer
    description: 'Silver view - cleaned customer data'
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique
      - name: full_name
        tests:
          - not_null
      - name: first_name
        tests:
          - not_null
      - name: last_name
        tests:
          - not_null
      - name: name_initials
        tests:
          - not_null

  - name: stg_order_detail
    description: 'Silver view - cleaned order_detail headers'
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
      - name: store_id
        tests:
          - not_null
      - name: order_total
        tests:
          - not_null

  - name: stg_order_item
    description: 'Silver view - cleaned order items'
    columns:
      - name: order_item_id
        tests:
          - not_null
          - unique
      - name: order_id
        tests:
          - not_null
      - name: sku
        tests:
          - not_null

  - name: stg_product
    description: 'Silver view - cleaned product attributes'
    columns:
      - name: product_key
        tests:
          - not_null
          - unique
      - name: product_name
        tests:
          - not_null

  - name: stg_store
    description: 'Silver view - cleaned store attributes'
    columns:
      - name: store_id
        tests:
          - not_null
          - unique
      - name: store_name
        tests:
          - not_null

  - name: stg_supply
    description: 'Silver view - cleaned supplies linked to SKUs'
    columns:
      - name: supply_id
        tests:
          - not_null
      - name: sku
        tests:
          - not_null

  - name: stg_discount
    description: 'Silver view - cleaned discounts per customer'
    columns:
      - name: discount_id
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
      - name: discount_pct
        tests:
          - not_null